services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kulenkov_hr
      POSTGRES_USER: kulenkov
      POSTGRES_PASSWORD: kulenkov_hr_db_2026
    volumes:
      - kulenkov_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kulenkov -d kulenkov_hr"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://kulenkov:kulenkov_hr_db_2026@postgres:5432/kulenkov_hr
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kulenkov_pg_data:
